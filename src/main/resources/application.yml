spring:
  application:
    name: NearPoint
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/nearpoint}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate            # Flyway owns the schema; Hibernate only validates
    open-in-view: false
  flyway:
    baseline-on-migrate: true       # existing DB already has `places` but no history table
    baseline-version: 1
  cache:
    cache-names: nearbyPlaces,placeDetails,autocomplete
    caffeine:
      spec: maximumSize=1000,expireAfterWrite=10m
  mvc:
    problemdetails:
      enabled: true                 # RFC 7807 error bodies

server:
  port: ${SERVER_PORT:8070}

# --- Application config (env-var overridable) ---
google:
  places:
    api:
      key: ${GOOGLE_PLACES_API_KEY:}
      # Places API (New) endpoints — overridable so tests can point them at WireMock
      text-search-url: ${GOOGLE_PLACES_TEXT_SEARCH_URL:https://places.googleapis.com/v1/places:searchText}
      nearby-search-url: ${GOOGLE_PLACES_NEARBY_SEARCH_URL:https://places.googleapis.com/v1/places:searchNearby}
      details-url-base: ${GOOGLE_PLACES_DETAILS_URL_BASE:https://places.googleapis.com/v1/places/}
      autocomplete-url: ${GOOGLE_PLACES_AUTOCOMPLETE_URL:https://places.googleapis.com/v1/places:autocomplete}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,https://near-point.vercel.app}

turnstile:
  secret-key: ${TURNSTILE_SECRET_KEY:}    # blank -> bot verification disabled

api:
  key: ${API_KEY:}                        # blank -> API-key auth disabled (public demo)

# JWT auth for user accounts (set a strong JWT_SECRET in production, >= 32 chars)
jwt:
  secret: ${JWT_SECRET:nearpoint-dev-secret-change-me-please-32chars-minimum-0123456789}
  expiration-days: ${JWT_EXPIRATION_DAYS:7}

# Web Push (VAPID). Blank by default → push disabled. Generate with:
#   npx web-push generate-vapid-keys  (then set VAPID_PUBLIC_KEY / VAPID_PRIVATE_KEY)
vapid:
  public-key: ${VAPID_PUBLIC_KEY:}
  private-key: ${VAPID_PRIVATE_KEY:}
  subject: ${VAPID_SUBJECT:mailto:hello@nearpoint.app}

# --- Observability ---
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
  metrics:
    tags:
      application: NearPoint

# --- Resilience for the Google Places call ---
resilience4j:
  circuitbreaker:
    instances:
      googlePlaces:
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        registerHealthIndicator: false
        # 4xx means our request was bad (key/params), not the upstream being down — don't trip the breaker
        ignoreExceptions:
          - org.springframework.web.client.HttpClientErrorException
  retry:
    instances:
      googlePlaces:
        maxAttempts: 3
        waitDuration: 500ms
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
        retryExceptions:
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpServerErrorException
        ignoreExceptions:
          - org.springframework.web.client.HttpClientErrorException
