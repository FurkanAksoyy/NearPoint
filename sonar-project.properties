# SonarCloud / SonarQube configuration.
# Replace the org and project key with your own (SonarCloud → your project → Information).
# The Maven scanner (sonar:sonar) also picks these up; JaCoCo coverage path is set in pom.xml.
sonar.organization=YOUR_SONAR_ORG
sonar.projectKey=YOUR_SONAR_PROJECT_KEY
sonar.projectName=NearPoint
sonar.host.url=https://sonarcloud.io

sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
