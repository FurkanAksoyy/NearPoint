name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest   # GitHub runners include Docker, so Testcontainers works
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build, run tests (unit + Testcontainers ITs) and coverage
        run: ./mvnw -B verify

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco

  sonar:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: build-test
    if: ${{ github.event_name == 'push' && github.repository_owner != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for accurate blame/new-code analysis

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        # Set SONAR_ORG and SONAR_PROJECT_KEY as repository variables (Settings → Variables)
        run: >
          ./mvnw -B verify sonar:sonar
          -Dsonar.host.url=https://sonarcloud.io
          -Dsonar.organization=${{ vars.SONAR_ORG }}
          -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
